<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get manifest ai</title>
    <meta name="description" content="Download manifest ai — vision into life. Available on the App Store and Google Play.">
    <link rel="icon" type="image/svg+xml" href="../app-icon-cream.svg">
    <link rel="canonical" href="https://ashwinbadhiye.github.io/manifest/download/">

    <!-- Redirect mobile visitors straight to their store, before the page paints -->
    <script>
        (function () {
            var IOS = 'https://apps.apple.com/us/app/manifest-ai-vision-into-life/id6775246699';
            var ANDROID = 'https://play.google.com/store/apps/details?id=com.aristaai.manifestai';
            var ua = navigator.userAgent || navigator.vendor || '';
            var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            var isAndroid = /android/i.test(ua);
            if (isIOS) {
                window.location.replace(IOS);
            } else if (isAndroid) {
                window.location.replace(ANDROID);
            }
            // Desktop / unknown: fall through and show the landing below.
        })();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=DM+Sans:wght@400;500;600&display=swap');

        :root {
            --accent-deep: #2d3436;
            --accent-gold: #c5a059;
            --text-muted: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at top right, #fdf6e3, #f4e8d1);
            color: var(--accent-deep);
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 100%;
            max-width: 460px;
            text-align: center;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            padding: 3.2rem 2.4rem;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08);
        }

        .app-icon {
            width: 78px;
            height: 78px;
            border-radius: 20px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            margin-bottom: 1.4rem;
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .kicker {
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-gold);
            font-weight: 600;
            margin: 0.5rem 0 1.6rem;
        }

        .lead {
            color: var(--text-muted);
            font-size: 1.02rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .store-buttons {
            display: flex;
            gap: 0.9rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .store-buttons img {
            height: 46px;
            width: auto;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .store-buttons a:hover img {
            transform: translateY(-3px) scale(1.02);
        }

        .qr-block {
            margin-top: 2.4rem;
            padding-top: 2.2rem;
            border-top: 1px solid rgba(197, 160, 89, 0.2);
        }

        .qr-block img {
            width: 150px;
            height: 150px;
        }

        .qr-caption {
            font-size: 0.75rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 0.6rem;
        }

        /* Phones tap the badges directly — hide the scan prompt */
        @media (max-width: 560px) {
            .qr-block { display: none; }
            .card { padding: 2.6rem 1.8rem; }
        }
    </style>
</head>

<body>
    <main class="card">
        <img src="../app-icon-cream.svg" alt="manifest ai icon" class="app-icon">
        <div class="brand">manifest ai</div>
        <div class="kicker">vision into life</div>
        <p class="lead">Taking you to your app store&hellip;<br>Not redirected? Choose your platform below.</p>

        <div class="store-buttons">
            <a href="https://apps.apple.com/us/app/manifest-ai-vision-into-life/id6775246699">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="Download on the App Store">
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.aristaai.manifestai">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
            </a>
        </div>

        <div class="qr-block">
            <img src="../assets/qr-download.svg" alt="QR code to download manifest ai">
            <div class="qr-caption">Scan with your phone</div>
        </div>
    </main>
</body>

</html>
